# ============================================================
# ElAhmed Retail Suite — Docker Compose
# ============================================================

version: '3.8'

services:
  # ============================================================
  # Frontend (Nginx)
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elahmed-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - elahmed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================
  # Backend (Node.js API)
  # ============================================================
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: elahmed-backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - elahmed-network
    restart: unless-stopped
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: elahmed-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - elahmed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_add:
      - SYS_NICE  # Reduce noise

  # ============================================================
  # Redis (for BullMQ)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: elahmed-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - elahmed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Prometheus (Metrics)
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: elahmed-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - elahmed-network
    restart: unless-stopped

  # ============================================================
  # Grafana (Visualization)
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: elahmed-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - elahmed-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # ============================================================
  # Sentry (Error Tracking)
  # ============================================================
  sentry:
    image: sentry:latest
    container_name: elahmed-sentry
    environment:
      - SENTRY_SECRET_KEY=${SENTRY_SECRET_KEY}
      - SENTRY_POSTGRES_HOST=postgres
      - SENTRY_POSTGRES_PORT=5432
      - SENTRY_POSTGRES_USER=${DB_USER}
      - SENTRY_POSTGRES_PASSWORD=${DB_PASSWORD}
      - SENTRY_POSTGRES_DB=sentry
      - SENTRY_REDIS_HOST=redis
      - SENTRY_REDIS_PORT=6379
    volumes:
      - sentry-data:/var/lib/sentry
    ports:
      - "${SENTRY_PORT:-9000}:9000"
    networks:
      - elahmed-network
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

# ============================================================
# Networks
# ============================================================
networks:
  elahmed-network:
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  sentry-data:
