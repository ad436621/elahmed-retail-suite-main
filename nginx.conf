server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml+rss
        image/svg+xml font/woff font/woff2;

    # ── Security headers ─────────────────────────────────────
    # DENY prevents clickjacking — SAMEORIGIN is too permissive
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # X-XSS-Protection is deprecated and can introduce vulnerabilities;
    # CSP below replaces it.
    add_header X-XSS-Protection "0" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Content Security Policy
    # 'unsafe-inline' for styles is needed by CSS-in-JS / Tailwind injection.
    # script-src does NOT include 'unsafe-inline' — only our own bundle.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # HSTS — uncomment only after confirming HTTPS is fully configured
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Static asset caching ──────────────────────────────────
    # Vite content-hashes filenames — safe to cache 1 year
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA routing ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # HTML shell must never be cached (contains the app entrypoint)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health check ──────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Deny hidden files (.git, .env, etc.) ─────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
